name: monitor
on:
  schedule:
    - cron: "13 */2 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-jammy
    steps:
      - uses: actions/checkout@v4
      - run: npm init -y >/dev/null 2>&1 && npm i -D playwright@1.48.0 >/dev/null 2>&1
      - run: node scripts/public-monitor.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screens-${{ github.run_id }}
          path: screens/
          retention-days: 7
          if-no-files-found: ignore
      - name: publish health json
        if: always()
        run: |
          test -f data/live-health.json || exit 0
          git config user.name starfire-watch
          git config user.email actions@users.noreply.github.com
          git add data/live-health.json
          git diff --cached --quiet || git commit -m "health $(date -u +%FT%TZ)"
          git push
