name: n8n-list-creds
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [".github/workflows/n8n-list-creds.yml", "scripts/n8n-list-creds.sh"]
jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: gate
        id: gate
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          if [ -z "$N8N_API_KEY" ]; then echo "ready=no" >> "$GITHUB_OUTPUT"; else echo "ready=yes" >> "$GITHUB_OUTPUT"; fi
      - name: read pod url
        if: steps.gate.outputs.ready == 'yes'
        uses: actions/checkout@v4
        with:
          repository: BetterSocieties/starfire-core
          token: ${{ secrets.CORE_READ_TOKEN }}
          path: core
          sparse-checkout: config/n8n-cloud-url
      - name: list credentials
        if: steps.gate.outputs.ready == 'yes'
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          export N8N_URL="$(cat core/config/n8n-cloud-url)"
          bash scripts/n8n-list-creds.sh
