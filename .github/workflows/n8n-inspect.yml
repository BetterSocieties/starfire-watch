name: n8n-inspect
on: { workflow_dispatch: {} }
concurrency: { group: n8n-pod-mutations, cancel-in-progress: false }
jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: pod url
        uses: actions/checkout@v4
        with: { repository: BetterSocieties/starfire-core, token: "${{ secrets.CORE_READ_TOKEN }}", path: core, sparse-checkout: config/n8n-cloud-url }
      - name: inspect
        env: { N8N_API_KEY: "${{ secrets.N8N_API_KEY }}" }
        run: |
          export N8N_URL="$(cat core/config/n8n-cloud-url)"
          bash scripts/n8n-inspect.sh
