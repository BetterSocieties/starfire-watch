name: n8n-activate
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [".github/workflows/n8n-activate.yml", "scripts/n8n-activate.sh"]
  schedule:
    - cron: "51 */2 * * *"
concurrency:
  group: n8n-pod-mutations
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  activate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: gate on key
        id: gate
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          if [ -z "$N8N_API_KEY" ]; then echo "ready=no" >> "$GITHUB_OUTPUT"; echo "no key yet"; else echo "ready=yes" >> "$GITHUB_OUTPUT"; fi
      - name: read pod url
        if: steps.gate.outputs.ready == 'yes'
        uses: actions/checkout@v4
        with:
          repository: BetterSocieties/starfire-core
          token: ${{ secrets.CORE_READ_TOKEN }}
          path: core
          sparse-checkout: config/n8n-cloud-url
      - name: activate all workflows
        if: steps.gate.outputs.ready == 'yes'
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          export N8N_URL="$(cat core/config/n8n-cloud-url)"
          bash scripts/n8n-activate.sh
      - name: publish activate report
        if: always() && steps.gate.outputs.ready == 'yes'
        run: |
          test -f data/n8n-activate-report.json || exit 0
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name starfire-watch
          git config user.email actions@users.noreply.github.com
          git add data/n8n-activate-report.json
          git diff --cached --quiet || git commit -m "n8n-activate report $(date -u +%FT%TZ)"
          git push
