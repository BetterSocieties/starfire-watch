name: n8n-workflow-sync
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "get or put"
        required: true
        default: "get"
      workflow_id:
        description: "n8n workflow id"
        required: true
concurrency:
  group: n8n-pod-mutations
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: gate
        id: gate
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          if [ -z "$N8N_API_KEY" ]; then echo "ready=no" >> "$GITHUB_OUTPUT"; else echo "ready=yes" >> "$GITHUB_OUTPUT"; fi
      - name: read pod url
        if: steps.gate.outputs.ready == 'yes'
        uses: actions/checkout@v4
        with:
          repository: BetterSocieties/starfire-core
          token: ${{ secrets.CORE_READ_TOKEN }}
          path: core
          sparse-checkout: config/n8n-cloud-url
      - name: sync workflow
        if: steps.gate.outputs.ready == 'yes'
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          MODE: ${{ inputs.mode }}
          WF_ID: ${{ inputs.workflow_id }}
        run: |
          export N8N_URL="$(cat core/config/n8n-cloud-url)"
          bash scripts/n8n-workflow-sync.sh
